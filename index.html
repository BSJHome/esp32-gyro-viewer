<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>ESP32 Viewer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
}

/* ===== MENU ===== */
#menu {
  width: 350px;
  padding: 20px;
  background: #1a1a1a;
  overflow-y: auto;
  height: 100vh;
}

input, button {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

button {
  background: #333;
  color: white;
  border: none;
}

/* ===== 3D ===== */
#viewer {
  flex: 1;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div id="menu">
  <h2>ESP32 BMI160 Viewer</h2>

  <label>WSS broker</label>
  <input id="broker" value="wss://YOUR_BROKER:8884">

  <label>MQTT bruger</label>
  <input id="user">

  <label>Password</label>
  <input id="pass" type="password">

  <button onclick="connect()">Forbind</button>

  <hr>

  <h3>Status</h3>
  <div id="status">Ikke forbundet</div>

  <h3>Rotation</h3>
  <div id="rot">-</div>
</div>

<!-- ===== 3D ===== -->
<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// ===== 3D SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth - 350, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0x888888));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(3,3,3);
scene.add(light);

// ===== GROUP =====
const group = new THREE.Group();
scene.add(group);

// ===== TEXTURE =====
const loader = new THREE.TextureLoader();
const texture = loader.load("velux_box.png");

// ===== BOX =====
const materials = [
  new THREE.MeshStandardMaterial({ color: 0x9a8a6a }),
  new THREE.MeshStandardMaterial({ color: 0x9a8a6a }),
  new THREE.MeshStandardMaterial({ color: 0x9a8a6a }),
  new THREE.MeshStandardMaterial({ color: 0x9a8a6a }),
  new THREE.MeshStandardMaterial({ map: texture }),
  new THREE.MeshStandardMaterial({ color: 0x9a8a6a })
];

const box = new THREE.Mesh(
  new THREE.BoxGeometry(1.6, 2.4, 0.5),
  materials
);
group.add(box);

// ===== AXES =====
const axes = new THREE.AxesHelper(1.5);
group.add(axes);

// ===== LABEL =====
function label(text, color) {
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 128;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = color;
  ctx.font = "bold 80px Arial";
  ctx.fillText(text, 100, 80);

  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.5,0.25,1);
  return sprite;
}

const lx = label("X","red"); lx.position.set(1.8,0,0); group.add(lx);
const ly = label("Y","green"); ly.position.set(0,1.8,0); group.add(ly);
const lz = label("Z","blue"); lz.position.set(0,0,1.8); group.add(lz);

// ===== MQTT (dummy) =====
function connect() {
  document.getElementById("status").innerText = "Forbundet (simuleret)";
}

// ===== ANIMATION =====
function animate() {
  requestAnimationFrame(animate);

  // TEST rotation (senere fra ESP32)
  group.rotation.y += 0.01;

  lx.lookAt(camera.position);
  ly.lookAt(camera.position);
  lz.lookAt(camera.position);

  renderer.render(scene, camera);
}
animate();

// ===== RESIZE =====
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth - 350, window.innerHeight);
  camera.aspect = (window.innerWidth - 350) / window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
