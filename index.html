<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32 BMI160 Web Viewer</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#eee; }
    .wrap { display:grid; grid-template-columns: 380px 1fr; min-height:100vh; }
    .panel { padding:16px; background:#1a1a1a; overflow:auto; }
    .viewer { position:relative; }
    .row { margin-bottom:12px; }
    input, button { width:100%; padding:10px; margin-top:6px; box-sizing:border-box; }
    button { cursor:pointer; }
    .status { padding:8px; background:#222; border-radius:8px; margin-bottom:12px; }
    .small { font-size:12px; opacity:.8; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .value { font-weight:bold; }
    canvas { display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h2>ESP32 BMI160 Viewer</h2>

    <div class="row">
      <label>WSS broker URL</label>
      <input id="brokerUrl" value="wss://09cf903bcc164264a7e7668d4cc7478f.s1.eu.hivemq.cloud:8884/mqtt" />
      <div class="small">Eksempel: wss://din-host:8884/mqtt</div>
    </div>

    <div class="row">
      <label>MQTT brugernavn</label>
      <input id="username" value="gyro_cloud" />
    </div>

    <div class="row">
      <label>MQTT password</label>
      <input id="password" type="password" value="Gyro_cloudog0086" />
    </div>

    <div class="row">
      <label>Device ID (valgfrit)</label>
      <input id="deviceId" value="" />
      <div class="small">Lad feltet være tomt for auto-detect</div>
    </div>

    <div class="row">
      <button onclick="connectMQTT()">Forbind</button>
    </div>

    <div class="status" id="statusBox">Ikke forbundet</div>

    <div class="row">
      <div>Aktiv device: <span class="value" id="activeDevice">-</span></div>
      <div>Base topic: <span class="value" id="activeTopic">-</span></div>
    </div>

    <div class="grid2">
      <div>Roll: <span class="value" id="rollVal">-</span></div>
      <div>Pitch: <span class="value" id="pitchVal">-</span></div>
      <div>Yaw: <span class="value" id="yawVal">-</span></div>
      <div>Home: <span class="value" id="homeVal">-</span></div>
    </div>

    <hr>

    <h3>Kommandoer</h3>
    <div class="grid2">
      <button onclick="publishCmd('set_home','PRESS')">Set Home</button>
      <button onclick="publishCmd('clear_home','PRESS')">Clear Home</button>
      <button onclick="publishCmd('calibrate_gyro','PRESS')">Kalibrer gyro</button>
      <button onclick="publishCmd('reset_filter','PRESS')">Reset filter</button>
    </div>

    <hr>

    <h3>On / Off</h3>
    <div class="grid2">
      <button onclick="publishSet('publish_enable', 'ON')">Publish ON</button>
      <button onclick="publishSet('publish_enable', 'OFF')">Publish OFF</button>
      <button onclick="publishSet('log_enable', 'ON')">Log ON</button>
      <button onclick="publishSet('log_enable', 'OFF')">Log OFF</button>
      <button onclick="publishSet('bias_learning_enable', 'ON')">Bias ON</button>
      <button onclick="publishSet('bias_learning_enable', 'OFF')">Bias OFF</button>
      <button onclick="publishSet('home_enable', 'ON')">Home ON</button>
      <button onclick="publishSet('home_enable', 'OFF')">Home OFF</button>
    </div>

    <hr>

    <h3>Parametre</h3>

    <div class="row">
      <label>Publish interval ms</label>
      <input id="publishMs" type="number" value="100">
      <button onclick="publishSet('publish_interval_ms', document.getElementById('publishMs').value)">Send</button>
    </div>

    <div class="row">
      <label>Log interval ms</label>
      <input id="logMs" type="number" value="300">
      <button onclick="publishSet('log_interval_ms', document.getElementById('logMs').value)">Send</button>
    </div>

    <div class="row">
      <label>Gyro cal seconds</label>
      <input id="calSec" type="number" value="3">
      <button onclick="publishSet('gyro_cal_seconds', document.getElementById('calSec').value)">Send</button>
    </div>

    <div class="row">
      <label>Madgwick beta</label>
      <input id="betaVal" type="number" step="0.001" value="0.08">
      <button onclick="publishSet('madgwick_beta', document.getElementById('betaVal').value)">Send</button>
    </div>

    <div class="row">
      <label>Accel LPF alpha</label>
      <input id="accelAlpha" type="number" step="0.01" value="0.35">
      <button onclick="publishSet('accel_lpf_alpha', document.getElementById('accelAlpha').value)">Send</button>
    </div>

    <div class="row">
      <label>Gyro LPF alpha</label>
      <input id="gyroAlpha" type="number" step="0.01" value="0.50">
      <button onclick="publishSet('gyro_lpf_alpha', document.getElementById('gyroAlpha').value)">Send</button>
    </div>
  </div>

  <div class="viewer">
    <canvas id="c"></canvas>
  </div>
</div>

<script>
let client = null;
let activeDeviceId = "";
let baseTopic = "";

// THREE
const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });

function resizeRenderer() {
  const panelWidth = 380;
  const w = Math.max(window.innerWidth - panelWidth, 300);
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
renderer.setPixelRatio(window.devicePixelRatio || 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
camera.position.set(0, 0, 4);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(2, 2, 2);
scene.add(light);

const ambient = new THREE.AmbientLight(0x888888);
scene.add(ambient);

const geometry = new THREE.BoxGeometry(1.2, 0.25, 2.0);
const material = new THREE.MeshNormalMaterial();
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

resizeRenderer();
window.addEventListener("resize", resizeRenderer);

function setStatus(txt) {
  document.getElementById("statusBox").innerText = txt;
}

function setActiveDevice(deviceId) {
  activeDeviceId = deviceId;
  baseTopic = `gyro/${deviceId}`;
  document.getElementById("activeDevice").innerText = deviceId;
  document.getElementById("activeTopic").innerText = baseTopic;
}

function connectMQTT() {
  const brokerUrl = document.getElementById("brokerUrl").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const manualDeviceId = document.getElementById("deviceId").value.trim();

  activeDeviceId = "";
  baseTopic = "";
  document.getElementById("activeDevice").innerText = "-";
  document.getElementById("activeTopic").innerText = "-";

  setStatus("Forbinder...");

  if (client) {
    try { client.end(true); } catch(e) {}
  }

  client = mqtt.connect(brokerUrl, {
    username,
    password,
    clean: true,
    reconnectPeriod: 2000
  });

  client.on("connect", () => {
    setStatus("Forbundet");

    if (manualDeviceId) {
      setActiveDevice(manualDeviceId);
      client.subscribe(`${baseTopic}/state/json`);
      client.subscribe(`${baseTopic}/availability`);
    } else {
      client.subscribe(`gyro/+/state/json`);
      client.subscribe(`gyro/+/availability`);
    }
  });

  client.on("reconnect", () => setStatus("Genforbinder..."));
  client.on("error", (err) => setStatus("Fejl: " + err.message));
  client.on("offline", () => setStatus("Offline"));

  client.on("message", (topic, payload) => {
    const msg = payload.toString();

    const parts = topic.split("/");
    if (parts.length >= 4 && parts[0] === "gyro") {
      const detectedDeviceId = parts[1];

      if (!activeDeviceId) {
        setActiveDevice(detectedDeviceId);
      }

      if (detectedDeviceId !== activeDeviceId) {
        return;
      }
    }

    if (topic === `${baseTopic}/availability`) {
      setStatus("Availability: " + msg);
      return;
    }

    if (topic === `${baseTopic}/state/json`) {
      try {
        const data = JSON.parse(msg);

        document.getElementById("rollVal").innerText = Number(data.roll ?? 0).toFixed(2);
        document.getElementById("pitchVal").innerText = Number(data.pitch ?? 0).toFixed(2);
        document.getElementById("yawVal").innerText = Number(data.yaw ?? 0).toFixed(2);
        document.getElementById("homeVal").innerText = data.home_set ? "Ja" : "Nej";

        if (
          data.qw !== undefined &&
          data.qx !== undefined &&
          data.qy !== undefined &&
          data.qz !== undefined
        ) {
          cube.quaternion.set(
            Number(data.qx),
            Number(data.qy),
            Number(data.qz),
            Number(data.qw)
          );
        } else {
          const roll  = Number(data.roll  || 0) * Math.PI / 180;
          const pitch = Number(data.pitch || 0) * Math.PI / 180;
          const yaw   = Number(data.yaw   || 0) * Math.PI / 180;
          cube.rotation.set(pitch, yaw, roll);
        }
      } catch (e) {
        console.error("JSON fejl:", e, msg);
      }
    }
  });
}

function publishCmd(cmd, payload) {
  if (!client || !baseTopic) return;
  client.publish(`${baseTopic}/cmd/${cmd}`, payload);
}

function publishSet(name, value) {
  if (!client || !baseTopic) return;
  client.publish(`${baseTopic}/cmd/${name}/set`, String(value));
}
</script>
</body>
</html>
